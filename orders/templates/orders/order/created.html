{% extends "website/website_base.html" %}
{% load static %}

{% block title %}
  Thank you
{% endblock %}

{% block content %}
  <h1>Thank you</h1>
  
  <div class="message-container">
    <center>
      <div class="message-container-image-box">
        <img src="{% static 'img/check.svg' %}" width="240px"/>
      </div>
      <p>Your order has been successfully completed. Your Tracking code has been sent to <br/>
         <strong>{{ order.email }}</strong>.
      </p>
      <a href="{% url 'shop:product_list' %}" >
        <button style="width:180px; height:44px; margin-bottom:12px;">Continue shopping</button>
      </a>
    </center>
  </div>
{% endblock %}
