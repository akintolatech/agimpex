<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Animation Demo</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f4f4f4;
    }

    section {
      height: 100vh; /* big sections so we can scroll */
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
    }

    .box {
      background: #4CAF50;
      color: white;
      padding: 50px;
      border-radius: 12px;
      opacity: 0;
      transform: translateY(50px);
      transition: all 0.8s ease;
    }

    .box.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <section class="box hidden">Box 1</section>
  <section class="box hidden">Box 2</section>
  <section class="box hidden">Box 3</section>
  <section class="box hidden">Box 4</section>

  <script>
    function revealOnScroll() {
      const elements = document.querySelectorAll('.hidden, .box');
      const triggerBottom = window.innerHeight * 0.8;

      elements.forEach(el => {
        const boxTop = el.getBoundingClientRect().top;

        if (boxTop < triggerBottom) {
          el.classList.add('show');
        } else {
          el.classList.remove('show');
        }
      });
    }

    window.addEventListener('scroll', revealOnScroll);
    window.addEventListener('load', revealOnScroll);
  </script>
</body>
</html>
